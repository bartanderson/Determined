<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Commonplace{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('browse.index') }}">Commonplace</a>
    <a href="{{ url_for('capture.capture_form') }}">+ Capture</a>
    <form action="{{ url_for('search.search') }}" method="get" class="nav-search">
      <input name="q" placeholder="Search..." value="{{ request.args.get('q', '') }}">
    </form>
  </nav>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash">{% for m in messages %}<li>{{ m }}</li>{% endfor %}</ul>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
