<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Determined — dev console</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.socket.io/4.6.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
</head>
<body>

<div class="shell">

  <!-- ── topbar ── -->
  <div class="topbar">
    <span class="title">Determined</span>
    <span class="sep">—</span>
    <span>dev console</span>
    <span class="sep">·</span>
    <span class="db-badge" id="db-badge">{{ db_name }}</span>
    <span class="spacer"></span>
    <span class="model-label">Ollama llama3.2:3b</span>
  </div>

  <!-- ── sidebar ── -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Analyze</div>
      <div class="sidebar-ingest">
        <input id="ingest-path" type="text" placeholder="Path to project…" autocomplete="off">
        <button id="ingest-btn" class="send-btn" style="width:100%;justify-content:center">Analyze ↵</button>
        <button id="resume-btn" class="send-btn" style="width:100%;justify-content:center;margin-top:4px;background:var(--surface2)">Resume…</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Start here</div>
      <div class="sidebar-item" data-tab="work_queue">
        <span class="icon">☑</span>work queue
      </div>
      <div class="sidebar-item" data-tab="dead_code">
        <span class="icon">∅</span>find dead code
      </div>
      <div class="sidebar-item" data-tab="unexplored">
        <span class="icon">○</span>unexplored
      </div>
      <div class="sidebar-item" data-tab="discover">
        <span class="icon">🔍</span>discover more
      </div>
      <div class="sidebar-item" data-tab="docstrings">
        <span class="icon">⚠</span>missing docstrings
      </div>
      <div class="sidebar-item" data-tab="todos">
        <span class="icon">✓</span>find todos
      </div>
    </div>
  </div>

  <!-- ── main ── -->
  <div class="main" id="main-panel">

    <!-- breadcrumb trail -->
    <div class="trail-bar" id="trail-bar" style="display:none">
      <span class="trail-label">Trail:</span>
      <div class="trail-chips" id="trail-chips"></div>
      <button class="trail-clear" id="trail-clear" title="Clear trail">✕</button>
    </div>

    <div class="query-bar">
      <input id="q-input" class="query-input" type="text"
             placeholder="Ask about the codebase…" autocomplete="off" autofocus>
      <button id="send-btn" class="send-btn">Ask ↵</button>
    </div>

    <!-- tab bar -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab active" data-tab="chat">Chat</button>
      <button class="tab tab-loading" data-tab="work_queue">Work queue</button>
      <button class="tab tab-loading" data-tab="dead_code">Dead code</button>
      <button class="tab tab-loading" data-tab="unexplored">Unexplored</button>
      <button class="tab tab-loading" data-tab="discover">Discover</button>
      <button class="tab tab-loading" data-tab="docstrings">Docstrings</button>
      <button class="tab tab-loading" data-tab="todos">Todos</button>
      <button class="tab" data-tab="call_tree">Call tree</button>
      <button class="tab" data-tab="graph">Graph</button>
    </div>

    <!-- tab panels -->
    <div class="tab-content">
      <div class="tab-panel active" id="panel-chat">
        <div id="results" class="results-area"></div>
      </div>
      <div class="tab-panel" id="panel-work_queue"><div class="results-area tab-results" id="tab-work_queue"><div class="tab-spinner">Loading…</div></div></div>
      <div class="tab-panel" id="panel-dead_code"><div class="results-area tab-results" id="tab-dead_code"><div class="tab-spinner">Loading…</div></div></div>
      <div class="tab-panel" id="panel-unexplored"><div class="results-area tab-results" id="tab-unexplored"><div class="tab-spinner">Loading…</div></div></div>
      <div class="tab-panel" id="panel-discover"><div class="results-area tab-results" id="tab-discover"><div class="tab-spinner">Loading…</div></div></div>
      <div class="tab-panel" id="panel-docstrings"><div class="results-area tab-results" id="tab-docstrings"><div class="tab-spinner">Loading…</div></div></div>
      <div class="tab-panel" id="panel-todos"><div class="results-area tab-results" id="tab-todos"><div class="tab-spinner">Loading…</div></div></div>
      <div class="tab-panel" id="panel-call_tree">
        <div class="call-tree-toolbar">
          <input id="ct-input" class="path-input" placeholder="Symbol to trace (e.g. process_message)" style="flex:1">
          <button class="send-btn" id="ct-go">Trace ↵</button>
          <label style="color:var(--text2);font-size:.85em;display:flex;align-items:center;gap:.3rem">
            <input type="checkbox" id="ct-up"> callers
          </label>
        </div>
        <div class="results-area tab-results" id="tab-call_tree" style="font-family:monospace;font-size:.85em"></div>
      </div>
      <div class="tab-panel" id="panel-graph">
        <div class="graph-toolbar">
          <input id="gx-input" class="path-input" placeholder="Symbol (e.g. process_message)" style="flex:1">
          <button class="send-btn" id="gx-go">Map ↵</button>
          <label style="color:var(--text2);font-size:.85em;display:flex;align-items:center;gap:.3rem">
            hops <select id="gx-hops" style="background:var(--surface2);color:var(--text1);border:1px solid var(--border);border-radius:3px;padding:2px 4px">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
            </select>
          </label>
        </div>
        <div id="gx-status" style="padding:.3rem .6rem;font-size:.8em;color:var(--text3);flex-shrink:0"></div>
        <div id="gx-cy" style="flex:1;min-height:0;background:var(--bg)"></div>
      </div>
    </div>

  </div>

  <!-- ── spotlight panel ── -->
  <div class="spotlight" id="spotlight" style="display:none">
    <div class="spotlight-header">
      <span class="spotlight-badge" id="sp-badge"></span>
      <span class="spotlight-name" id="sp-name"></span>
      <span class="spotlight-meta" id="sp-meta"></span>
      <button class="spotlight-close" id="sp-close">✕</button>
    </div>
    <div class="spotlight-actions" id="sp-actions"></div>
    <div class="spotlight-body" id="sp-body"></div>
  </div>

  <!-- ── hover tooltip ── -->
  <div class="sym-tooltip" id="sym-tooltip" style="display:none"></div>

  <!-- ── statusbar ── -->
  <div class="statusbar">
    <span id="conn-dot" class="status-dot offline"></span>
    <span id="conn-label">connecting…</span>
    <span class="sep">·</span>
    <span>{{ db_name }}</span>
    <span class="spacer"></span>
    <span id="elapsed" class="elapsed"></span>
  </div>

</div><!-- .shell -->

<script>
const socket    = io();
const input     = document.getElementById("q-input");
const sendBtn   = document.getElementById("send-btn");
const results   = document.getElementById("results");
const connDot   = document.getElementById("conn-dot");
const connLbl   = document.getElementById("conn-label");
const elapsed   = document.getElementById("elapsed");
const ingestBtn = document.getElementById("ingest-btn");
const ingestPath = document.getElementById("ingest-path");
const resumeBtn = document.getElementById("resume-btn");

let _t0 = 0;

// ── connection state ──────────────────────────────────────
socket.on("connect", () => {
  connDot.classList.remove("offline");
  connLbl.textContent = "connected";
});
socket.on("disconnect", () => {
  connDot.classList.add("offline");
  connLbl.textContent = "disconnected";
});

let _startupFired = false;

const TAB_QUERIES = {
  work_queue:  "what should I work on",
  dead_code:   "find dead code",
  unexplored:  "what haven't you explored?",
  discover:    "discover more",
  docstrings:  "what functions are missing docstrings",
  todos:       "find todos",
};

// server sends this immediately on connect if a corpus is already loaded
socket.on("corpus_ready", data => {
  document.getElementById("db-badge").textContent = data.db_name;
  sendBtn.disabled = false;
  ingestBtn.textContent = "New analysis ↵";
  ingestBtn.disabled = false;
  ingestBtn.dataset.mode = "replace";
  resumeBtn.disabled = true;

  // show quiet stats card first
  const block = document.createElement("div");
  block.className = "result-block";
  block.innerHTML = `
    <div class="result-header">
      <span class="kind-tag kind-survey">corpus</span>
      <span class="result-subject">${escHtml(data.db_name)}</span>
    </div>
    <div class="result-body">
      <div class="answer-text" style="color:var(--text2)">${data.files} files · ${data.hot} hot · ${data.stubs} stubs · ${data.artifacts} knowledge artifacts</div>
    </div>`;
  results.appendChild(block);

  // fire all tab queries once on load
  if (!_startupFired) {
    _startupFired = true;
    Object.entries(TAB_QUERIES).forEach(([tab, q]) => socket.emit("tab_query", { tab, question: q }));
    input.value = "session startup";
    sendQuery();
  }
});

// ── send query ────────────────────────────────────────────
function sendQuery() {
  const q = input.value.trim();
  if (!q) return;
  input.value = "";
  sendBtn.disabled = true;
  _t0 = Date.now();
  elapsed.textContent = "";

  addStatusMsg("Thinking…");
  socket.emit("query", { question: q });
}

input.addEventListener("keydown", e => { if (e.key === "Enter") sendQuery(); });
sendBtn.addEventListener("click", sendQuery);

// ── sidebar shortcuts ─────────────────────────────────────
// data-fill: put text in input, enable send button, focus
document.querySelectorAll(".sidebar-item[data-fill]").forEach(el => {
  el.addEventListener("click", () => {
    const fill = el.dataset.fill;
    if (!fill) return;
    input.value = fill;
    sendBtn.disabled = false;
    input.focus();
    input.setSelectionRange(fill.length, fill.length);
  });
});

// data-submit: fill input and immediately send (no subject needed)
document.querySelectorAll(".sidebar-item[data-submit]").forEach(el => {
  el.addEventListener("click", () => {
    input.value = el.dataset.submit;
    sendBtn.disabled = false;
    sendQuery();
  });
});

// ── tabs ──────────────────────────────────────────────────
function activateTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + name));
  // gx-cy is position:fixed so it persists across tab switches; hide when not on graph tab
  const cyEl = document.getElementById("gx-cy");
  if (cyEl && cyEl.style.position === "fixed") {
    cyEl.style.display = name === "graph" ? "" : "none";
  }
}

document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => activateTab(t.dataset.tab));
});

document.querySelectorAll(".sidebar-item[data-tab]").forEach(el => {
  el.addEventListener("click", () => activateTab(el.dataset.tab));
});

socket.on("tab_answer", data => {
  const panel = document.getElementById("tab-" + data.tab);
  if (!panel) return;
  panel.innerHTML = "";
  const block = document.createElement("div");
  block.className = "result-block";
  block.innerHTML = `<div class="result-body"><div class="answer-text">${colorize(data.answer)}</div></div>`;
  panel.appendChild(block);
  // mark tab as loaded
  const tabBtn = document.querySelector(`.tab[data-tab="${data.tab}"]`);
  if (tabBtn) tabBtn.classList.remove("tab-loading");
  attachSymbolHandlers(panel);
});

// ── call tree ─────────────────────────────────────────────
const ctInput  = document.getElementById("ct-input");
const ctGo     = document.getElementById("ct-go");
const ctUp     = document.getElementById("ct-up");
const ctPanel  = document.getElementById("tab-call_tree");

function ctTrace(symbol) {
  if (!symbol) return;
  ctPanel.innerHTML = "";
  const dir = ctUp.checked ? "up" : "down";
  const root = ctMakeNode(symbol, dir, 0);
  ctPanel.appendChild(root);
  ctExpand(root, symbol, dir);
}

function ctMakeNode(symbol, dir, depth) {
  const li = document.createElement("div");
  li.className = "ct-node";
  li.dataset.symbol = symbol;
  li.dataset.dir = dir;
  li.dataset.depth = depth;
  li.style.paddingLeft = (depth * 1.4) + "rem";
  li.innerHTML = `<span class="ct-toggle">▶</span> <span class="ct-sym sym-link">${escHtml(symbol)}</span> <span class="ct-children-wrap"></span>`;
  li.querySelector(".ct-sym").addEventListener("click", e => {
    e.stopPropagation();
    ctInput.value = symbol;
    ctTrace(symbol);
  });
  li.querySelector(".ct-toggle").addEventListener("click", e => {
    e.stopPropagation();
    const wrap = li.querySelector(".ct-children");
    if (!wrap) { ctExpand(li, symbol, dir); return; }
    const open = wrap.style.display !== "none";
    wrap.style.display = open ? "none" : "";
    li.querySelector(".ct-toggle").textContent = open ? "▶" : "▼";
  });
  return li;
}

function ctExpand(li, symbol, dir) {
  const toggle = li.querySelector(".ct-toggle");
  toggle.textContent = "…";
  socket.emit("call_tree_expand", { symbol, direction: dir });
  li._ctPending = true;
}

socket.on("call_tree_result", data => {
  if (data.error) {
    ctPanel.innerHTML = `<div style="color:var(--risk-hot);padding:.5rem">${escHtml(data.error)}</div>`;
    return;
  }
  // find the node waiting for this symbol
  const pending = ctPanel.querySelector(`.ct-node[data-symbol="${CSS.escape(data.symbol)}"]`);
  if (!pending) return;
  pending._ctPending = false;
  const toggle = pending.querySelector(".ct-toggle");
  const wrap   = document.createElement("div");
  wrap.className = "ct-children";
  if (!data.children || data.children.length === 0) {
    toggle.textContent = "·";
    wrap.innerHTML = `<div class="ct-leaf" style="padding-left:${(+pending.dataset.depth + 1) * 1.4}rem;color:var(--text3)">(no ${data.direction === "down" ? "callees" : "callers"})</div>`;
  } else {
    toggle.textContent = "▼";
    for (const c of data.children) {
      const child = ctMakeNode(c.symbol, data.direction, +pending.dataset.depth + 1);
      const meta  = document.createElement("span");
      meta.className = "ct-meta";
      meta.textContent = c.file ? ` — ${c.file}:${c.line}` : "";
      child.appendChild(meta);
      wrap.appendChild(child);
    }
  }
  pending.appendChild(wrap);
});

ctGo.addEventListener("click", () => ctTrace(ctInput.value.trim()));
ctInput.addEventListener("keydown", e => { if (e.key === "Enter") ctTrace(ctInput.value.trim()); });
// clicking a symbol in any panel seeds the call-tree input
document.addEventListener("click", e => {
  const el = e.target.closest(".sym-link, .spotlight-sym-link");
  if (el && el.dataset && el.dataset.symbol) ctInput.value = el.dataset.symbol;
});

// ── graph (cytoscape) ────────────────────────────────────
const gxInput  = document.getElementById("gx-input");
const gxGo     = document.getElementById("gx-go");
const gxHops   = document.getElementById("gx-hops");
const gxStatus = document.getElementById("gx-status");
let _cy = null;

const GX_STYLE = [
  { selector: "node", style: {
      label: "data(label)",
      "font-size": 10,
      "font-family": "monospace",
      "text-valign": "bottom",
      "text-margin-y": 4,
      color: "#a0a8b8",
      "background-color": "#3a4055",
      "border-width": 1,
      "border-color": "#555e7a",
      width: 22, height: 22,
  }},
  { selector: "node[risk='hot']",  style: { "background-color": "#7a2228", "border-color": "#d44" } },
  { selector: "node[risk='warm']", style: { "background-color": "#5a4010", "border-color": "#c80" } },
  { selector: "node.gx-root",     style: {
      "background-color": "#1a4a7a", "border-color": "#4af", "border-width": 2,
      width: 30, height: 30, "font-size": 11, color: "#cde",
  }},
  { selector: "edge", style: {
      width: 1, "line-color": "#3a4055",
      "target-arrow-color": "#3a4055", "target-arrow-shape": "triangle",
      "curve-style": "bezier", opacity: 0.7,
  }},
  { selector: "node:selected", style: { "border-color": "#8af", "border-width": 2 } },
];

function gxMap(symbol) {
  if (!symbol) return;
  gxStatus.textContent = `Mapping ${symbol}…`;
  if (_cy) { _cy.destroy(); _cy = null; }
  const cyEl = document.getElementById("gx-cy");
  cyEl.innerHTML = "";
  // position fixed so Cytoscape gets a real viewport-measured box
  // regardless of the broken flex/grid parent chain
  const toolbar = document.querySelector(".graph-toolbar");
  const tbRect  = toolbar.getBoundingClientRect();
  const sbRect  = document.querySelector(".statusbar").getBoundingClientRect();
  cyEl.style.position = "fixed";
  cyEl.style.left   = tbRect.left + "px";
  cyEl.style.top    = (tbRect.bottom + 2) + "px";
  cyEl.style.width  = tbRect.width + "px";
  cyEl.style.height = (sbRect.top - tbRect.bottom - 4) + "px";
  cyEl.style.zIndex = "10";
  socket.emit("graph_subgraph", { symbol, hops: parseInt(gxHops.value) });
}

socket.on("graph_result", data => {
  if (data.error) { gxStatus.textContent = `Error: ${data.error}`; return; }
  const nodes = data.nodes.map(n => ({ data: {
    id: n.id, label: n.label || n.id.split(".").pop(),
    risk: n.risk || "cool", file: n.file || "", line: n.line || 0,
  }, classes: n.id === data.root ? "gx-root" : "" }));
  const edges = data.edges.map(e => ({ data: {
    id: `${e.source}__${e.target}`, source: e.source, target: e.target,
  }}));
  gxStatus.textContent = `${nodes.length} nodes · ${edges.length} edges`;
  _cy = cytoscape({
    container: document.getElementById("gx-cy"),
    elements: [...nodes, ...edges],
    style: GX_STYLE,
    layout: { name: "cose", animate: false, randomize: false,
               nodeRepulsion: 8000, idealEdgeLength: 80, nodeDimensionsIncludeLabels: true },
  });
  _cy.on("tap", "node", evt => {
    const sym = evt.target.data("id");
    gxInput.value = sym;
    ctInput.value = sym;
    // single tap = open spotlight for inspect
    openSpotlight(sym);
  });
  _cy.on("dblclick dbltap", "node", evt => {
    // double tap = re-center graph on this node
    gxMap(evt.target.data("id"));
  });
  _cy.on("mouseover", "node", evt => {
    const d = evt.target.data();
    gxStatus.textContent = `${d.id}${d.file ? "  —  " + d.file + ":" + d.line : ""}  [${d.risk}]`;
  });
  _cy.on("mouseout", "node", () => {
    gxStatus.textContent = `${nodes.length} nodes · ${edges.length} edges`;
  });
});

gxGo.addEventListener("click", () => gxMap(gxInput.value.trim()));
gxInput.addEventListener("keydown", e => { if (e.key === "Enter") gxMap(gxInput.value.trim()); });

// when a symbol is clicked anywhere, also seed the graph input
document.addEventListener("click", e => {
  const el = e.target.closest(".sym-link, .spotlight-sym-link, .ct-sym");
  if (el && el.dataset && el.dataset.symbol) gxInput.value = el.dataset.symbol;
});

const clearHistBtn = document.getElementById("btn-clear-history");
if (clearHistBtn) clearHistBtn.addEventListener("click", () => {
  socket.emit("clear_history");
  results.innerHTML = "";
});

// ── analyze ───────────────────────────────────────────────
resumeBtn.addEventListener("click", () => {
  const existing = document.getElementById("db-picker");
  if (existing) { existing.remove(); return; }
  resumeBtn.disabled = true;
  socket.emit("list_dbs");
});

socket.on("db_list", data => {
  resumeBtn.disabled = false;
  const existing = document.getElementById("db-picker");
  if (existing) existing.remove();
  const block = document.createElement("div");
  block.id = "db-picker";
  block.className = "result-block";
  const rows = data.dbs.length
    ? data.dbs.map(db => {
        const cls   = db.valid ? "db-pick-item" : "db-pick-item db-pick-invalid";
        const label = db.valid ? "" : ' <span style="color:var(--text3);font-size:.8em">(incompatible)</span>';
        return `<div class="${cls}" data-path="${escHtml(db.path)}" style="padding:6px 8px;cursor:${db.valid?'pointer':'default'};border-radius:4px;display:flex;justify-content:space-between;align-items:center">
          <span>${escHtml(db.name)}${label}</span>
          <span style="color:var(--text3);font-size:.8em">${db.size_mb} MB</span>
        </div>`;
      }).join("")
    : `<div style="color:var(--text3);padding:6px 0">No .db files found in current directory.</div>`;
  block.innerHTML = `
    <div class="result-header">
      <span class="kind-tag kind-survey">resume</span>
      <span class="result-subject">Select a corpus to load</span>
      <button class="send-btn" style="background:var(--surface2);margin-left:auto" id="db-picker-close">Cancel</button>
    </div>
    <div class="result-body" style="flex-direction:column;gap:2px">${rows}</div>`;
  results.appendChild(block);
  results.scrollTop = results.scrollHeight;
  document.getElementById("db-picker-close").addEventListener("click", () => block.remove());
  block.querySelectorAll(".db-pick-item:not(.db-pick-invalid)").forEach(el => {
    el.addEventListener("mouseenter", () => el.style.background = "var(--surface2)");
    el.addEventListener("mouseleave", () => el.style.background = "");
    el.addEventListener("click", () => {
      block.remove();
      addStatusMsg("Loading corpus…");
      socket.emit("load_db", { path: el.dataset.path });
    });
  });
});

function startScan(path) {
  ingestBtn.disabled = true;
  addStatusMsg(`Scanning ${path}…`);
  socket.emit("scan", { path });
}

function startIngest(path) {
  clearStatusMsgs();
  addStatusMsg(`Analyzing ${path}… (this may take several minutes)`);
  socket.emit("ingest", { path });
}

ingestBtn.addEventListener("click", () => {
  // "New Analysis" mode: warn before replacing the loaded corpus
  if (ingestBtn.dataset.mode === "replace") {
    const existing = document.getElementById("new-analysis-warn");
    if (existing) return; // already showing
    const warn = document.createElement("div");
    warn.id = "new-analysis-warn";
    warn.className = "result-block";
    warn.innerHTML = `
      <div class="result-header"><span class="kind-tag" style="background:var(--risk-hot)">warning</span>
        <span class="result-subject">Replace current corpus?</span></div>
      <div class="result-body" style="display:flex;align-items:center;gap:1rem">
        <span style="color:var(--text2)">This will discard the loaded corpus and conversation history.</span>
        <button class="send-btn" id="new-analysis-confirm">Yes, replace</button>
        <button class="send-btn" style="background:var(--surface2)" id="new-analysis-cancel">Cancel</button>
      </div>`;
    results.appendChild(warn);
    results.scrollTop = results.scrollHeight;
    document.getElementById("new-analysis-confirm").addEventListener("click", () => {
      warn.remove();
      ingestBtn.textContent = "Analyze ↵";
      ingestBtn.dataset.mode = "";
      resumeBtn.disabled = false;
      ingestPath.value = "";
      ingestPath.focus();
    });
    document.getElementById("new-analysis-cancel").addEventListener("click", () => warn.remove());
    return;
  }
  const p = ingestPath.value.trim();
  if (p) { startScan(p); return; }
  ingestBtn.disabled = true;
  socket.emit("browse", {});
});

ingestPath.addEventListener("keydown", e => {
  if (e.key === "Enter" && ingestPath.value.trim()) startScan(ingestPath.value.trim());
});

socket.on("browse_result", data => {
  ingestBtn.disabled = false;
  if (data.path) { ingestPath.value = data.path; startScan(data.path); }
});

socket.on("scan_result", data => {
  ingestBtn.disabled = false;
  clearStatusMsgs();
  if (data.error) { addErrorBlock(data.error); return; }
  const secs = Math.max(5, data.file_count * 2 + data.size_mb * 3);
  const timeEst = secs < 60
    ? `~${Math.round(secs)}s`
    : `~${Math.max(1, Math.round(secs / 60))} min`;
  const block = document.createElement("div");
  block.className = "result-block _scan-confirm";
  block.innerHTML = `
    <div class="result-header">
      <span class="kind-tag kind-survey">scan</span>
      <span class="result-subject">${escHtml(data.path)}</span>
    </div>
    <div class="result-body" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
      <span>${data.file_count.toLocaleString()} source files &middot; ${data.size_mb} MB &middot; ${timeEst}</span>
      <button class="send-btn" id="confirm-ingest">Analyze ↵</button>
      <button class="send-btn" style="background:var(--surface2)" id="cancel-ingest">Cancel</button>
    </div>`;
  results.appendChild(block);
  results.scrollTop = results.scrollHeight;
  document.getElementById("confirm-ingest").addEventListener("click", () => {
    block.remove();
    startIngest(data.path);
  });
  document.getElementById("cancel-ingest").addEventListener("click", () => {
    block.remove();
    ingestPath.value = "";
    ingestBtn.disabled = false;
  });
});

socket.on("ingest_status", data => addStatusMsg(data.message));

socket.on("ingest_done", data => {
  ingestBtn.disabled = false;
  sendBtn.disabled = false;
  clearStatusMsgs();
  document.getElementById("db-badge").textContent = data.db_name;
  if (data.skipped > 0) {
    addStatusMsg(`${data.skipped} file${data.skipped === 1 ? '' : 's'} skipped (syntax errors)`);
  }
  input.value = "what do you know?";
  sendQuery();
});

socket.on("ingest_error", data => {
  ingestBtn.disabled = false;
  clearStatusMsgs();
  addErrorBlock(data.message);
});

// ── receive events ────────────────────────────────────────
socket.on("status", data => {
  addStatusMsg(data.message);
  if (data.message === "History cleared.") {
    sendBtn.disabled = false;
  }
});

socket.on("answer", data => {
  sendBtn.disabled = false;
  const ms = Date.now() - _t0;
  elapsed.textContent = (ms / 1000).toFixed(1) + "s";
  clearStatusMsgs();
  addResultBlock(data.question, data.answer);
});

socket.on("error", data => {
  sendBtn.disabled = false;
  clearStatusMsgs();
  addErrorBlock(data.message);
});

// ── DOM helpers ───────────────────────────────────────────
function addStatusMsg(msg) {
  clearStatusMsgs();
  const d = document.createElement("div");
  d.className = "status-msg _status";
  d.textContent = msg;
  results.appendChild(d);
  results.scrollTop = results.scrollHeight;
}

function clearStatusMsgs() {
  results.querySelectorAll("._status").forEach(e => e.remove());
}

function addErrorBlock(msg) {
  const block = document.createElement("div");
  block.className = "result-block";
  block.innerHTML = `
    <div class="result-header">
      <span class="kind-tag kind-impact">error</span>
      <span class="result-subject">Pipeline error</span>
    </div>
    <div class="result-body">
      <div class="answer-text" style="color:var(--red)">${escHtml(msg)}</div>
    </div>`;
  results.appendChild(block);
  results.scrollTop = results.scrollHeight;
}

function addResultBlock(question, answer) {
  const kind   = detectKind(answer);
  const kindCss = kindClass(kind);

  // split answer body from follow-ups (separated by blank line starting with ">")
  const parts    = splitFollowups(answer);
  const bodyText = colorize(parts.body);
  const followupHtml = parts.followups.length
    ? `<div class="followups">
         <div class="followup-label">Suggested follow-ups</div>
         ${parts.followups.map(f =>
           `<span class="followup-chip" data-q="${escAttr(f)}">${escHtml(f)}</span>`
         ).join("")}
       </div>`
    : "";

  const block = document.createElement("div");
  block.className = "result-block";
  block.innerHTML = `
    <div class="result-header">
      <span class="kind-tag ${kindCss}">${kind}</span>
      <span class="result-subject">${escHtml(truncate(question, 60))}</span>
      <div class="toggle-group" title="view mode">
        <span class="tog active" data-mode="normal" title="normal">≡</span>
        <span class="tog"        data-mode="compact" title="compact">⋯</span>
        <span class="tog"        data-mode="raw"    title="raw">{ }</span>
      </div>
      <select class="limit-select" title="item limit">
        <option>all</option><option>25</option><option>15</option><option>10</option><option>5</option>
      </select>
    </div>
    <div class="question-echo">${escHtml(question)}</div>
    <div class="result-body">
      <div class="answer-text view-normal">${bodyText}</div>
      <div class="answer-text view-compact" style="display:none">${compactView(parts.body)}</div>
      <div class="answer-text view-raw"     style="display:none">${escHtml(parts.body)}</div>
      ${followupHtml}
    </div>`;

  // toggle logic
  block.querySelectorAll(".tog").forEach(tog => {
    tog.addEventListener("click", () => {
      block.querySelectorAll(".tog").forEach(t => t.classList.remove("active"));
      tog.classList.add("active");
      const mode = tog.dataset.mode;
      block.querySelector(".view-normal").style.display  = mode === "normal"  ? "" : "none";
      block.querySelector(".view-compact").style.display = mode === "compact" ? "" : "none";
      block.querySelector(".view-raw").style.display     = mode === "raw"     ? "" : "none";
    });
  });

  // follow-up click → fill query bar
  block.querySelectorAll(".followup-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      input.value = chip.dataset.q;
      input.focus();
    });
  });

  results.appendChild(block);
  results.scrollTop = results.scrollHeight;

  // upgrade decorative symbol spans to interactive ones
  attachSymbolHandlers(block);
}

// ── interactive symbols ───────────────────────────────────
// Replace colorize() spans with clickable sym-link / fp-link elements.
// Called after innerHTML is set; walks rendered spans and upgrades them.
function attachSymbolHandlers(container) {
  container.querySelectorAll(".sym, .fn").forEach(el => {
    const raw  = el.textContent.replace(/\($/, "").trim();
    // data-nav carries the resolved last-segment when the display text is dotted
    const name = el.dataset.nav || raw.split(".").pop() || raw;
    el.className = "sym-link";
    el.dataset.sym = name;
  });
  container.querySelectorAll(".fp").forEach(el => {
    el.className = "fp-link";
  });
  container.querySelectorAll(".sym-link").forEach(el => {
    el.addEventListener("mouseenter", onSymHover);
    el.addEventListener("mouseleave", onSymLeave);
    el.addEventListener("click",      e => { e.stopPropagation(); openSpotlight(el.dataset.sym); });
  });
}

// ── hover tooltip ─────────────────────────────────────────
const tooltip = document.getElementById("sym-tooltip");
let _tooltipTimer = null;
let _pendingSym = null;

function onSymHover(e) {
  const sym = e.currentTarget.dataset.sym;
  _pendingSym = sym;
  clearTimeout(_tooltipTimer);
  _tooltipTimer = setTimeout(() => {
    if (_pendingSym === sym) socket.emit("symbol_quick", { symbol: sym });
  }, 280);
}
function onSymLeave() {
  _pendingSym = null;
  clearTimeout(_tooltipTimer);
  tooltip.style.display = "none";
}

socket.on("symbol_quick_result", data => {
  if (data.error || _pendingSym === null) { tooltip.style.display = "none"; return; }
  const riskCls = { HOT: "risk-hot", WARM: "risk-warm", SAFE: "risk-safe" }[data.risk] || "";
  tooltip.innerHTML = `
    <div class="tt-name"><span class="${riskCls}">${data.badge || ""}</span> ${escHtml(data.symbol)}</div>
    <div class="tt-meta">${data.type} · ${escHtml(data.file)} line ${data.line}</div>
    ${data.docstring ? `<div class="tt-doc">${escHtml(data.docstring)}</div>` : ""}
    <div class="tt-stats">
      <span>↙ ${data.caller_count} callers</span>
      <span>↗ ${data.callee_count} callees</span>
      ${data.findings_count ? `<span>◈ ${data.findings_count} findings</span>` : ""}
    </div>
    <div class="tt-hint">click to open spotlight</div>`;
  positionTooltip();
  tooltip.style.display = "block";
});

let _mouseX = 0, _mouseY = 0;
document.addEventListener("mousemove", e => { _mouseX = e.clientX; _mouseY = e.clientY; });
function positionTooltip() {
  const pad = 12;
  let x = _mouseX + pad, y = _mouseY + pad;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
  tooltip.style.display = "block";
  const r = tooltip.getBoundingClientRect();
  if (r.right  > window.innerWidth)  x = _mouseX - r.width  - pad;
  if (r.bottom > window.innerHeight) y = _mouseY - r.height - pad;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
}

// ── spotlight panel ───────────────────────────────────────
const spotlight  = document.getElementById("spotlight");
const spBadge    = document.getElementById("sp-badge");
const spName     = document.getElementById("sp-name");
const spMeta     = document.getElementById("sp-meta");
const spActions  = document.getElementById("sp-actions");
const spBody     = document.getElementById("sp-body");
const spClose    = document.getElementById("sp-close");
const shell      = document.querySelector(".shell");
let _currentSpotlight = null;

const SP_SECTIONS = {
  risk:    { label: "Risk Profile",  order: 0 },
  intent:  { label: "Intent",        order: 1 },
  callers: { label: "Callers",       order: 2 },
  callees: { label: "Calls",         order: 3 },
  findings:{ label: "Findings",      order: 4 },
};

function openSpotlight(sym) {
  tooltip.style.display = "none";
  if (_currentSpotlight === sym) { closeSpotlight(); return; }
  _currentSpotlight = sym;

  // highlight all sym-link spans for this symbol
  document.querySelectorAll(".sym-link").forEach(el => {
    el.classList.toggle("in-spotlight", el.dataset.sym === sym);
  });

  spName.textContent = sym;
  spBadge.textContent = "";
  spBadge.className = "spotlight-badge";
  spMeta.textContent = "";
  spActions.innerHTML = "";
  spBody.innerHTML = "";

  // placeholder sections while loading
  Object.entries(SP_SECTIONS).sort((a,b) => a[1].order - b[1].order).forEach(([key, meta]) => {
    const sec = document.createElement("div");
    sec.className = "sp-section";
    sec.id = `sp-sec-${key}`;
    sec.innerHTML = `<div class="sp-section-label">${meta.label}</div>
                     <div class="sp-section-content sp-loading" id="sp-content-${key}">loading…</div>`;
    spBody.appendChild(sec);
  });

  // action buttons
  const actions = [
    { label: "full brief",    q: `understand ${sym}`,          cls: "primary" },
    { label: "trace from…",  q: `trace ${sym} to `,           cls: "" },
    { label: "git history",  q: `git history of ${sym}`,       cls: "" },
    { label: "similar",      q: `find similar to ${sym}`,      cls: "" },
    { label: "store note",   q: `store finding for ${sym}`,    cls: "" },
  ];
  actions.forEach(a => {
    const btn = document.createElement("button");
    btn.className = `sp-action ${a.cls}`;
    btn.textContent = a.label;
    btn.addEventListener("click", () => {
      input.value = a.q;
      if (!a.q.endsWith(" ")) { sendQuery(); } else { input.focus(); }
    });
    spActions.appendChild(btn);
  });

  spotlight.style.display = "flex";
  shell.classList.add("spotlight-open");
  trailAdd(sym);
  socket.emit("symbol_spotlight", { symbol: sym });
}

function closeSpotlight() {
  _currentSpotlight = null;
  spotlight.style.display = "none";
  shell.classList.remove("spotlight-open");
  document.querySelectorAll(".sym-link.in-spotlight").forEach(el => el.classList.remove("in-spotlight"));
}

spClose.addEventListener("click", closeSpotlight);

socket.on("spotlight_section", data => {
  if (data.symbol !== _currentSpotlight) return;
  const el = document.getElementById(`sp-content-${data.key}`);
  if (!el) return;
  el.className = "sp-section-content";
  // linkify "<name> in <file>.py line N" lines so callers/calls are walkable
  el.innerHTML = escHtml(data.content).replace(
    /^(\s*)([A-Za-z_]\w*(?:\.[A-Za-z_]\w*)*)(\s+in\s+)(\S+\.py)(\s+line\s+\d+)/gm,
    (m, ind, name, inw, fp, tail) =>
      `${ind}<span class="sym" data-nav="${escHtml(name.split('.').pop())}">${escHtml(name)}</span>${inw}<span class="fp">${fp}</span>${tail}`
  );
  attachSymbolHandlers(el);

  // extract risk badge from risk section
  if (data.key === "risk") {
    const m = data.content.match(/\[(HOT|WARM|SAFE)\]/);
    if (m) {
      const lvl = m[1];
      const cls = { HOT: "risk-hot", WARM: "risk-warm", SAFE: "risk-safe" }[lvl] || "";
      spBadge.textContent = lvl;
      spBadge.className = `spotlight-badge ${cls}`;
    }
  }
});

socket.on("spotlight_done", data => {
  if (data.symbol !== _currentSpotlight) return;
  spMeta.textContent = "ready";
});

socket.on("spotlight_error", data => {
  spBody.innerHTML = `<div class="sp-section"><div class="sp-section-content" style="color:var(--red)">${escHtml(data.message)}</div></div>`;
});

// ── trail / breadcrumbs ───────────────────────────────────
const trailBar   = document.getElementById("trail-bar");
const trailChips = document.getElementById("trail-chips");
const trailClear = document.getElementById("trail-clear");
let _trail = [];

function trailAdd(sym) {
  if (_trail[_trail.length - 1] === sym) return;
  _trail.push(sym);
  renderTrail();
}

function renderTrail() {
  trailBar.style.display = _trail.length ? "flex" : "none";
  trailChips.innerHTML = "";
  _trail.forEach((sym, i) => {
    if (i > 0) {
      const arr = document.createElement("span");
      arr.className = "trail-arrow";
      arr.textContent = "→";
      trailChips.appendChild(arr);
    }
    const chip = document.createElement("span");
    chip.className = "trail-chip" + (i === _trail.length - 1 ? " current" : "");
    chip.textContent = sym;
    chip.addEventListener("click", () => openSpotlight(sym));
    trailChips.appendChild(chip);
  });
}

trailClear.addEventListener("click", () => {
  _trail = [];
  renderTrail();
  closeSpotlight();
});

// ── answer analysis ───────────────────────────────────────
function detectKind(answer) {
  const a = answer.toLowerCase();
  if (a.includes("direct callers of") || a.includes("callers:"))  return "callers";
  if (a.includes("impact") || a.includes("what breaks"))          return "impact";
  if (a.includes("file_purpose") || a.includes("design_note") ||
      a.includes("known_issue") || a.includes("finding"))         return "findings";
  if (a.includes("files:\n") || a.includes("symbols:\n"))         return "survey";
  if (a.includes("knowledge coverage:") || a.includes("not yet explored:") ||
      a.includes("unexplored files"))                              return "coverage";
  return "answer";
}

function kindClass(kind) {
  return {
    callers:  "kind-callers",
    findings: "kind-findings",
    impact:   "kind-impact",
    survey:   "kind-survey",
    coverage: "kind-survey",
    answer:   "kind-answer",
  }[kind] || "kind-answer";
}

function splitFollowups(answer) {
  const lines = answer.split("\n");
  const body = [], followups = [];
  let inFollowups = false;
  for (const line of lines) {
    if (!inFollowups && (line.startsWith("> ") || line.startsWith("Follow-up") || line.startsWith("Suggested"))) {
      inFollowups = true;
    }
    if (inFollowups && line.startsWith("> ")) {
      followups.push(line.replace(/^>\s*/, "").replace(/^\d+\.\s*/, "").trim());
    } else if (!inFollowups) {
      body.push(line);
    }
  }
  return { body: body.join("\n").trim(), followups };
}

// light syntax coloring for answer text
function colorize(text) {
  // The model wraps real code in backticks - that's the reliable symbol signal.
  // Tagging by capitalization tagged prose words ("Key", "The") as fake symbols
  // and missed backticked identifiers. Only backtick content becomes navigable.
  return escHtml(text).replace(/`([^`]+)`/g, (m, inner) => {
    const t = inner.trim();
    if (/^[\w/]+\.py$/.test(t))   return `<span class="fp">${t}</span>`;     // file path
    if (/^[A-Za-z_]\w*$/.test(t)) return `<span class="sym">${t}</span>`;    // identifier
    return `<span class="code">${inner}</span>`;                            // other code span
  });
}

function compactView(text) {
  const lines = text.split("\n").filter(l => l.trim());
  return escHtml(lines.slice(0, 6).join(" · ") + (lines.length > 6 ? " …" : ""));
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + "…" : s; }

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function escAttr(s) { return escHtml(s); }
</script>
